name: Generate & Deploy Dashboard

on:
  repository_dispatch:
    types: [artifact-published]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data.json'

permissions:
  contents: write

jobs:
  generate:
    name: Generate Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Fetch data & commit data.json to main
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail

          MODULES_ARR="[]"

          # ── Helper: fetch CI status filtered on build-and-publish.yml ──────
          ci_status() {
            local REPO="$1"
            gh run list --repo "$REPO" --workflow "build-and-publish.yml" --limit 3 \
              --json conclusion \
              --jq '[.[] | select(.conclusion != null)] | .[0].conclusion // "unknown"' \
              2>/dev/null || echo "unknown"
          }

          # ── Helper: fetch entcore version from pom.xml at a given tag ─────
          fetch_entcore_version() {
            local REPO="$1" TAG="$2"
            for pom in "backend/pom.xml" "pom.xml"; do
              local content
              content=$(gh api "repos/$REPO/contents/$pom?ref=$TAG" \
                --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
              if [ -n "$content" ]; then
                local ver
                ver=$(echo "$content" | grep -oP '(?<=<entCoreVersion>)[^<]+' | head -1)
                [ -z "$ver" ] && ver=$(echo "$content" | grep -oP '(?<=<entcore\.version>)[^<]+' | head -1)
                [ -n "$ver" ] && echo "$ver" && return
              fi
            done
            echo ""
          }

          # ── Helper: fetch releases via REST API ────────────────────────────
          fetch_releases() {
            local REPO="$1"
            local RAW
            RAW=$(gh api "repos/$REPO/releases?per_page=5" \
              --jq '[.[] | {tagName: .tag_name, publishedAt: .published_at, body: .body, assets: [.assets[] | {name: .name, browser_download_url: .browser_download_url}]}]' \
              2>/dev/null || echo "[]")
            local RELEASES
            RELEASES=$(echo "$RAW" | jq --arg fallback "https://github.com/$REPO/releases" '
              [.[] | {
                tag:          .tagName,
                published_at: (.publishedAt // "" | split("T")[0]),
                body:         (.body // ""),
                jar_url: (
                  ([.assets[]? | select(.name | test("-fat\\.jar$")) | .browser_download_url][0])
                  // $fallback
                )
              }]
            ' 2>/dev/null || echo "[]")
            # Enrich latest release with entcore_version
            local LATEST_TAG
            LATEST_TAG=$(echo "$RELEASES" | jq -r '.[0].tag // empty' 2>/dev/null)
            if [ -n "$LATEST_TAG" ]; then
              local EC_VER
              EC_VER=$(fetch_entcore_version "$REPO" "$LATEST_TAG")
              if [ -n "$EC_VER" ]; then
                RELEASES=$(echo "$RELEASES" | jq --arg ec "$EC_VER" \
                  '[.[0] + {entcore_version: $ec}] + .[1:]')
              fi
            fi
            echo "$RELEASES"
          }

          add_module() {
            local NAME="$1" GROUP="$2" SECTION="$3" CI_STATUS="$4" \
                  CI_URL="$5" RELEASES_URL="$6" REPO_URL="$7" RELEASES="$8"
            local OBJ
            OBJ=$(jq -n \
              --arg name         "$NAME" \
              --arg group_id     "$GROUP" \
              --arg section      "$SECTION" \
              --arg ci_status    "$CI_STATUS" \
              --arg ci_url       "$CI_URL" \
              --arg releases_url "$RELEASES_URL" \
              --arg repo_url     "$REPO_URL" \
              --argjson releases "$RELEASES" \
              '{name:$name,group_id:$group_id,section:$section,ci_status:$ci_status,
                ci_url:$ci_url,releases_url:$releases_url,repo_url:$repo_url,
                releases:$releases}')
            MODULES_ARR=$(echo "$MODULES_ARR" | jq --argjson mod "$OBJ" '. + [$mod]')
          }

          # ══════════════════════════════════════════════════════════════════
          # SECTION 1 — ENTCORE (socle commun, fetch CI + tags une seule fois)
          # ══════════════════════════════════════════════════════════════════
          ENTCORE_REPO="open-ent/entcore-v2"
          echo "→ $ENTCORE_REPO (entcore modules)"

          ENTCORE_CI=$(gh run list --repo "$ENTCORE_REPO" --limit 5 --json conclusion \
            --jq '[.[] | select(.conclusion != null)] | .[0].conclusion // "unknown"' \
            2>/dev/null || echo "unknown")

          # Fetch real Maven versions from GitHub Packages metadata
          ENTCORE_META=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://maven.pkg.github.com/open-ent/entcore-v2/org/entcore/common/maven-metadata.xml" \
            2>/dev/null || echo "")
          ENTCORE_RELEASES="[]"
          if [ -n "$ENTCORE_META" ]; then
            LAST_UPDATED=$(echo "$ENTCORE_META" | grep -oP '(?<=<lastUpdated>)[^<]+' | head -1)
            PUBLISH_DATE=""
            [ ${#LAST_UPDATED} -ge 8 ] && PUBLISH_DATE="${LAST_UPDATED:0:4}-${LAST_UPDATED:4:2}-${LAST_UPDATED:6:2}"
            ENTCORE_RELEASES=$(echo "$ENTCORE_META" \
              | grep -oP '(?<=<version>)[^<]+' \
              | grep -v '\-dev$' \
              | head -5 \
              | jq -R -s \
                --arg packages_url "https://github.com/$ENTCORE_REPO/packages" \
                --arg published_at "$PUBLISH_DATE" \
                'split("\n") | map(select(length > 0)) | .[0:5]
                 | map({tag: ., published_at: $published_at, body: "", jar_url: $packages_url})' \
              2>/dev/null || echo "[]")
          fi

          ENTCORE_CI_URL="https://github.com/$ENTCORE_REPO/actions"
          ENTCORE_PKG_URL="https://github.com/$ENTCORE_REPO/packages"
          ENTCORE_REPO_URL="https://github.com/$ENTCORE_REPO"

          # Modules clés d'entcore
          ENTCORE_MODULES=(
            "auth|org.entcore|Authentification & SSO"
            "common|org.entcore|Bibliothèque commune"
            "directory|org.entcore|Annuaire & Groupes"
            "workspace|org.entcore|Espace documentaire"
            "conversation|org.entcore|Messagerie"
            "timeline|org.entcore|Fil d'actualité"
            "portal|org.entcore|Portail & Navigation"
            "session|org.entcore|Sessions utilisateur"
            "communication|org.entcore|Infrastructure communication"
            "feeder|org.entcore|Alimentation des données"
            "admin|org.entcore|Administration"
            "infra|org.entcore|Infrastructure verticale"
            "archive|org.entcore|Archivage"
            "audience|org.entcore|Statistiques audience"
            "cas|org.entcore|CAS / SSO fédéré"
          )

          for entry in "${ENTCORE_MODULES[@]}"; do
            IFS='|' read -r NAME GROUP _DESC <<< "$entry"
            add_module "$NAME" "$GROUP" "entcore" "$ENTCORE_CI" \
              "$ENTCORE_CI_URL" "$ENTCORE_PKG_URL" "$ENTCORE_REPO_URL" "$ENTCORE_RELEASES"
          done

          # ══════════════════════════════════════════════════════════════════
          # SECTION 2 — APPLICATIONS (GitHub Releases, fat JAR)
          # ══════════════════════════════════════════════════════════════════
          REPOS_APPS=(
            "open-ent/actualites|net.atos|actualites"
            "open-ent/appointments|fr.openent|appointments"
            "open-ent/blog|org.entcore|blog"
            "open-ent/cahier-de-textes|fr.openent|diary"
            "open-ent/calendar|net.atos|calendar"
            "open-ent/chat-nats|fr.openent|chat-nats"
            "open-ent/collaborative-editor|net.atos|collaborative-editor"
            "open-ent/collaborative-wall|net.atos|collaborativewall"
            "open-ent/exercizer|fr.openent|exercizer"
            "open-ent/explorer|com.opendigitaleducation|explorer"
            "open-ent/form|fr.openent|form"
            "open-ent/forum|net.atos|forum"
            "open-ent/mindmap|net.atos|mindmap"
            "open-ent/pages|fr.wseduc|pages"
            "open-ent/poll|net.atos|poll"
            "open-ent/rack|fr.wseduc|rack"
            "open-ent/rss|net.atos|rss"
            "open-ent/school-planner|fr.tech.openent|school-planner"
            "open-ent/schoolbook|fr.tech.openent|schoolbook"
            "open-ent/search-engine|fr.openent|search-engine"
            "open-ent/support|net.atos|support"
            "open-ent/timeline-generator|net.atos|timelinegenerator"
            "open-ent/vote|fr.openent|vote"
            "open-ent/wiki|net.atos|wiki"
            "open-ent/workflowhub|fr.openent|workflowhub"
            "open-ent/community|net.atos|community"
            "open-ent/mod-sms-sender|fr.wseduc|mod-sms-proxy"
            "open-ent/moodle-connector|fr.openent|moodle-connector"
            "open-ent/ressource-aggregator|fr.openent|mediacentre"
            "open-ent/vie-scolaire|fr.openent|viescolaire"
            "open-ent/edt|fr.cgi|edt"
            "open-ent/presences|fr.openent|presences"
          )

          for entry in "${REPOS_APPS[@]}"; do
            IFS='|' read -r REPO GROUP NAME <<< "$entry"
            echo "→ $REPO"
            CI=$(ci_status "$REPO")
            RELEASES=$(fetch_releases "$REPO")
            add_module "$NAME" "$GROUP" "apps" "$CI" \
              "https://github.com/$REPO/actions" \
              "https://github.com/$REPO/releases" \
              "https://github.com/$REPO" \
              "$RELEASES"
          done

          # ══════════════════════════════════════════════════════════════════
          # SECTION 3 — INFRASTRUCTURE (modules techniques)
          # ══════════════════════════════════════════════════════════════════
          REPOS_INFRA=(
            "open-ent/mod-zip|fr.wseduc|mod-zip"
            "open-ent/http-proxy|fr.wseduc|http-proxy"
            "open-ent/mod-image-resizer|fr.wseduc|mod-image-resizer"
            "open-ent/mod-json-schema-validator|fr.wseduc|mod-json-schema-validator"
            "open-ent/mod-mongo-persistor|fr.wseduc|mod-mongo-persistor"
            "open-ent/mod-pdf-generator|fr.wseduc|mod-pdf-generator"
            "open-ent/mod-postgresql|fr.wseduc|mod-postgresql"
            "open-ent/mod-sftp|fr.cgi|mod-sftp"
          )

          for entry in "${REPOS_INFRA[@]}"; do
            IFS='|' read -r REPO GROUP NAME <<< "$entry"
            echo "→ $REPO"
            CI=$(ci_status "$REPO")
            RELEASES=$(fetch_releases "$REPO")
            add_module "$NAME" "$GROUP" "infra" "$CI" \
              "https://github.com/$REPO/actions" \
              "https://github.com/$REPO/releases" \
              "https://github.com/$REPO" \
              "$RELEASES"
          done

          # ══════════════════════════════════════════════════════════════════
          # SECTION 4 — CONNECTEURS (intégrations tierces)
          # ══════════════════════════════════════════════════════════════════
          REPOS_CONNECTORS=(
            "open-ent/gar-connector|fr.openent|gar-connector"
            "open-ent/moodle-connector|fr.openent|moodle-connector"
            "open-ent/wordpress-connector|fr.openent|wordpress-connector"
          )

          for entry in "${REPOS_CONNECTORS[@]}"; do
            IFS='|' read -r REPO GROUP NAME <<< "$entry"
            echo "→ $REPO"
            CI=$(ci_status "$REPO")
            RELEASES=$(fetch_releases "$REPO")
            add_module "$NAME" "$GROUP" "connectors" "$CI" \
              "https://github.com/$REPO/actions" \
              "https://github.com/$REPO/releases" \
              "https://github.com/$REPO" \
              "$RELEASES"
          done

          GENERATED_AT=$(date -u '+%d/%m/%Y à %H:%M UTC')

          jq -n \
            --argjson modules "$MODULES_ARR" \
            --arg generated_at "$GENERATED_AT" \
            '{modules: $modules, generated_at: $generated_at}' > data.json

          echo "data.json: $(jq '.modules | length' data.json) modules"

          git config user.name "passtech"
          git config user.email "passtech@passtech.fr"
          git remote set-url origin "https://x-access-token:${GH_PACKAGES_TOKEN}@github.com/open-ent/open-ent.github.io.git"
          git add data.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update data.json [skip ci]" && \
            git push origin main
