name: Generate & Deploy Dashboard

on:
  repository_dispatch:
    types: [artifact-published]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data.json'

permissions:
  contents: write

jobs:
  generate:
    name: Generate Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch data & commit data.json to main
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail

          # Standard modules (use GitHub Releases)
          REPOS=(
            "open-ent/mod-zip|fr.wseduc|mod-zip"
            "open-ent/http-proxy|fr.wseduc|http-proxy"
            "open-ent/mod-image-resizer|fr.wseduc|mod-image-resizer"
            "open-ent/mod-json-schema-validator|fr.wseduc|mod-json-schema-validator"
            "open-ent/mod-mongo-persistor|fr.wseduc|mod-mongo-persistor"
            "open-ent/mod-pdf-generator|fr.wseduc|mod-pdf-generator"
            "open-ent/mod-postgresql|fr.wseduc|mod-postgresql"
            "open-ent/actualites|net.atos|actualites"
            "open-ent/appointments|fr.openent|appointments"
            "open-ent/blog|org.entcore|blog"
            "open-ent/cahier-de-textes|fr.openent|diary"
            "open-ent/calendar|net.atos|calendar"
            "open-ent/collaborative-editor|net.atos|collaborative-editor"
            "open-ent/collaborative-wall|net.atos|collaborativewall"
            "open-ent/exercizer|fr.openent|exercizer"
            "open-ent/explorer|com.opendigitaleducation|explorer"
            "open-ent/forum|net.atos|forum"
            "open-ent/mindmap|net.atos|mindmap"
            "open-ent/mod-sftp|fr.cgi|mod-sftp"
            "open-ent/pages|fr.wseduc|pages"
            "open-ent/poll|net.atos|poll"
            "open-ent/rack|fr.wseduc|rack"
            "open-ent/rss|net.atos|rss"
            "open-ent/search-engine|fr.openent|search-engine"
            "open-ent/support|net.atos|support"
            "open-ent/timeline-generator|net.atos|timelinegenerator"
            "open-ent/wiki|net.atos|wiki"
          )

          # Repos that publish to GitHub Packages but don't use GitHub Releases (use tags instead)
          REPOS_TAGS_ONLY=(
            "open-ent/entcore-v2|org.entcore|entcore"
          )

          MODULES_ARR="[]"

          for entry in "${REPOS[@]}"; do
            IFS='|' read -r REPO GROUP NAME <<< "$entry"
            echo "→ $REPO"

            CI_STATUS=$(gh run list --repo "$REPO" --limit 5 --json conclusion \
              --jq '[.[] | select(.conclusion != null)] | .[0].conclusion // "unknown"' \
              2>/dev/null || echo "unknown")

            RELEASES=$(gh release list --repo "$REPO" --limit 5 \
              --json tagName,publishedAt,body,assets 2>/dev/null || echo "[]")

            RELEASES_CLEAN=$(echo "$RELEASES" | jq --arg fallback "https://github.com/$REPO/releases" '
              [.[] | {
                tag:          .tagName,
                published_at: (.publishedAt // "" | split("T")[0]),
                body:         (.body // ""),
                jar_url: (
                  ([.assets[]? | select(.name | test("-fat\\.jar$")) | .browser_download_url][0])
                  // $fallback
                )
              }]
            ' 2>/dev/null || echo "[]")

            MODULE_OBJ=$(jq -n \
              --arg name         "$NAME" \
              --arg group_id     "$GROUP" \
              --arg ci_status    "$CI_STATUS" \
              --arg ci_url       "https://github.com/$REPO/actions" \
              --arg releases_url "https://github.com/$REPO/releases" \
              --arg repo_url     "https://github.com/$REPO" \
              --argjson releases "$RELEASES_CLEAN" \
              '{name:$name,group_id:$group_id,ci_status:$ci_status,
                ci_url:$ci_url,releases_url:$releases_url,repo_url:$repo_url,
                releases:$releases}')

            MODULES_ARR=$(echo "$MODULES_ARR" | jq --argjson mod "$MODULE_OBJ" '. + [$mod]')
          done

          for entry in "${REPOS_TAGS_ONLY[@]}"; do
            IFS='|' read -r REPO GROUP NAME <<< "$entry"
            echo "→ $REPO (tags mode)"

            CI_STATUS=$(gh run list --repo "$REPO" --limit 5 --json conclusion \
              --jq '[.[] | select(.conclusion != null)] | .[0].conclusion // "unknown"' \
              2>/dev/null || echo "unknown")

            # Use tags sorted by version (newest first), keep patched ones first
            TAGS_RAW=$(gh api "repos/$REPO/tags" --jq '[.[] | .name]' 2>/dev/null || echo "[]")

            RELEASES_CLEAN=$(echo "$TAGS_RAW" | jq \
              --arg packages_url "https://github.com/$REPO/packages" \
              --arg repo_url "https://github.com/$REPO" '
              [ .[] | select(test("patched|[0-9]+\\.[0-9]+\\.[0-9]+")) ] | .[0:5] |
              [.[] | {
                tag:          .,
                published_at: "",
                body:         "",
                jar_url:      $packages_url
              }]
            ' 2>/dev/null || echo "[]")

            MODULE_OBJ=$(jq -n \
              --arg name         "$NAME" \
              --arg group_id     "$GROUP" \
              --arg ci_status    "$CI_STATUS" \
              --arg ci_url       "https://github.com/$REPO/actions" \
              --arg releases_url "https://github.com/$REPO/tags" \
              --arg repo_url     "https://github.com/$REPO" \
              --argjson releases "$RELEASES_CLEAN" \
              '{name:$name,group_id:$group_id,ci_status:$ci_status,
                ci_url:$ci_url,releases_url:$releases_url,repo_url:$repo_url,
                releases:$releases}')

            MODULES_ARR=$(echo "$MODULES_ARR" | jq --argjson mod "$MODULE_OBJ" '. + [$mod]')
          done

          GENERATED_AT=$(date -u '+%d/%m/%Y à %H:%M UTC')

          jq -n \
            --argjson modules "$MODULES_ARR" \
            --arg generated_at "$GENERATED_AT" \
            '{modules: $modules, generated_at: $generated_at}' > data.json

          echo "data.json: $(jq '.modules | length' data.json) modules"

          git config user.name "passtech"
          git config user.email "passtech@passtech.fr"
          git add data.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update data.json [skip ci]" && \
            git push origin main
